version = 1

[instructions]
scope = """
Audit every repository under repos/ as production code.

Focus on concrete, exploitable security and correctness issues in file access,
path handling, request parsing, command execution, authentication, authorization,
and cross-repository trust boundaries. Prefer a small number of high-confidence
findings over broad best-practice advice.

For any candidate issue, run the repository's local tests and create a focused
proof script or command output that demonstrates the behavior. Only mark a
finding proven after observing concrete behavior locally inside the VM.
"""

[workspace]
root = "."
exclude = []

[models]
api_key_env = "OPENROUTER_API_KEY"
default = "openrouter/z-ai/glm-5.2"
recon = "openrouter/z-ai/glm-5.2"
investigate = "openrouter/z-ai/glm-5.2"
review = "openrouter/z-ai/glm-5.2"
deduplicate = "openrouter/z-ai/glm-5.2"
validate = "openrouter/z-ai/glm-5.2"
finalize = "openrouter/z-ai/glm-5.2"

[runner]
cpus = 2
memory_gb = 4
disk_gb = 40
timeout_minutes = 90
max_leads = 8
max_investigations = 8
parallel_tasks = 1
