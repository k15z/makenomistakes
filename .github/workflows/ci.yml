name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Check scripts
        run: |
          bash -n scripts/*.sh
          python3 -m py_compile scripts/*.py

      - name: Test
        run: |
          go test ./...
          python3 scripts/validate-nodegoat-report_test.py

      - name: Vet
        run: go vet ./...
